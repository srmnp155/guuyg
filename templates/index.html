<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attractive Calculator</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }
        .calculator {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(8.5px);
            -webkit-backdrop-filter: blur(8.5px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 20px;
            width: 320px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: right;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.3);
        }
        button {
            width: 22%;
            margin: 1%;
            padding: 15px 0;
            font-size: 1.2em;
            border-radius: 10px;
            border: none;
            background: #6a11cb;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px 0 rgba(101, 41, 255, 0.75);
            transition: background 0.3s ease;
        }
        button:hover {
            background: linear-gradient(135deg, #2575fc 0%, #6a11cb 100%);
        }
        .button-row {
            display: flex;
            justify-content: space-between;
        }
        #result {
            margin-top: 15px;
            font-size: 1.3em;
            min-height: 1.5em;
            text-align: right;
            color: #ffeb3b;
            font-weight: bold;
        }
        .nav {
            margin-bottom: 15px;
            text-align: center;
        }
        .nav a {
            color: #ffeb3b;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }
        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="nav">
            <a href="/">Calculator</a> |
            <a href="/contact">Contact</a>
        </div>
        <input type="text" id="expression" placeholder="Enter expression" autocomplete="off" />
        <div class="button-row">
            <button onclick="appendChar('7')">7</button>
            <button onclick="appendChar('8')">8</button>
            <button onclick="appendChar('9')">9</button>
            <button onclick="appendChar('/')">÷</button>
        </div>
        <div class="button-row">
            <button onclick="appendChar('4')">4</button>
            <button onclick="appendChar('5')">5</button>
            <button onclick="appendChar('6')">6</button>
            <button onclick="appendChar('*')">×</button>
        </div>
        <div class="button-row">
            <button onclick="appendChar('1')">1</button>
            <button onclick="appendChar('2')">2</button>
            <button onclick="appendChar('3')">3</button>
            <button onclick="appendChar('-')">−</button>
        </div>
        <div class="button-row">
            <button onclick="appendChar('0')">0</button>
            <button onclick="appendChar('.')">.</button>
            <button onclick="clearExpression()">C</button>
            <button onclick="appendChar('+')">+</button>
        </div>
        <div class="button-row">
            <button style="width: 100%;" onclick="calculate()">=</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        const expressionInput = document.getElementById('expression');
        const resultDiv = document.getElementById('result');

        function appendChar(char) {
            expressionInput.value += char;
            resultDiv.textContent = '';
        }

        function clearExpression() {
            expressionInput.value = '';
            resultDiv.textContent = '';
        }

        async function calculate() {
            const expression = expressionInput.value.trim();
            if (!expression) {
                resultDiv.textContent = 'Enter an expression';
                return;
            }
            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ expression })
                });
                const data = await response.json();
                if (response.ok) {
                    resultDiv.textContent = data.result;
                } else {
                    resultDiv.textContent = data.error || 'Error calculating';
                }
            } catch (error) {
                resultDiv.textContent = 'Server error';
            }
        }

        expressionInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                calculate();
            }
        });
    </script>
</body>
</html>
