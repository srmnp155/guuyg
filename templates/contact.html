<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact - Attractive Calculator</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .content {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(8.5px);
            -webkit-backdrop-filter: blur(8.5px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 600px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #ffeb3b;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6em;
        }
        a {
            color: #ffeb3b;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .nav {
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        .nav a {
            color: #ffeb3b;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }
        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Calculator</a> |
        <a href="/contact">Contact</a>
    </div>
    <div class="content">
        <h1>Contact Us</h1>
        <p>If you have any questions or feedback about the Attractive Calculator, feel free to reach out!</p>
        <p>Email: <a href="mailto:support@attractivecalculator.com">support@attractivecalculator.com</a></p>
        <p>Phone: +1 (555) 123-4567</p>
        <p><a href="/">Back to Calculator</a></p>
    </div>
</body>
</html>
